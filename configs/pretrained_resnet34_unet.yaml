experiment_name: pretrained_resnet34_unet
model:
  name: resnet34_unet_pretrained
  pretrained: true
  base_channels: 64
  depth: 4
  group_norm_groups: 8
data:
  processed: data/processed/kitti_road
  image_size: [384, 1216]
  val_fraction: 0.2
  seed: 6681
training:
  epochs: 80
  batch_size: 8
  num_workers: 8
  lr: 0.0001
  weight_decay: 0.0001
  amp: true
  save_every: 10
  threshold: 0.5
outputs:
  checkpoint_dir: checkpoints
  report_dir: reports
